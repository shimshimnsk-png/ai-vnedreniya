<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Открыть проект</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0b;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 32px;
    }
    h1 {
      font-size: 20px;
      color: #fff;
      margin-bottom: 4px;
      text-align: center;
    }
    p.sub {
      font-size: 13px;
      color: #555;
      margin-bottom: 12px;
      text-align: center;
    }
    a {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 360px;
      padding: 24px;
      border-radius: 20px;
      text-decoration: none;
      transition: opacity 0.2s;
      gap: 6px;
    }
    a:hover { opacity: 0.85; }
    .label {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
    }
    .desc {
      font-size: 13px;
      opacity: 0.7;
      text-align: center;
    }
    .landing {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
    }
    .mini {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      border: 1px solid #334155;
    }
    .mini .label { color: #60a5fa; }
    .warning {
      font-size: 11px;
      color: #374151;
      text-align: center;
      max-width: 360px;
    }
  </style>
</head>
<body>
  <h1>СамостоятельныеЗапуски</h1>
  <p class="sub">Выбери что открыть</p>

  <a class="landing" href="http://127.0.0.1:5173/" target="_blank">
    <span class="label">Лендинг</span>
    <span class="desc">Главная страница сайта</span>
  </a>

  <a class="mini" href="http://127.0.0.1:5173/?view=mini" target="_blank">
    <span class="label">MiniApp</span>
    <span class="desc">Анкета для приёма заявок</span>
  </a>

  <p class="warning">⚠ Сервер должен быть запущен — npm run dev в терминале</p>
</body>
</html>
